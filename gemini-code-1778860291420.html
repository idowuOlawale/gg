<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Facebook – log in or sign up</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .topbar {
      width: 100%;
      text-align: center;
      padding: 14px 16px 0;
      font-size: 15px;
      color: #1c1e21;
    }

    .logo-wrap {
      margin-top: 44px;
      margin-bottom: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .fb-logo-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .content {
      width: 100%;
      max-width: 480px;
      padding: 0 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #dddfe2;
      border-radius: 6px;
      font-size: 17px;
      color: #1c1e21;
      outline: none;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
      -webkit-appearance: none;
    }

    input::placeholder { color: #90949c; }

    input:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 2px rgba(24,119,242,0.2);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #1877f2;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 18px;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-login:hover { background: #166fe5; }
    .btn-login:active { background: #1464d8; }

    .forgot {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #1c1e21;
      text-decoration: none;
      display: block;
      margin-bottom: 32px;
    }

    .spacer { flex: 1; min-height: 60px; }

    .btn-create {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #1877f2;
      font-size: 17px;
      font-weight: 600;
      border: 1.5px solid #1877f2;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 32px;
      transition: background 0.12s;
      font-family: inherit;
    }
    .btn-create:hover { background: #f0f2f5; }

    .footer {
      width: 100%;
      padding: 0 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .meta-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      color: #8a8d91;
      font-size: 15px;
      font-weight: 600;
    }

    .meta-logo-img {
      height: 14px;
      object-fit: contain;
    }

    .footer-links {
      display: flex;
      gap: 18px;
      font-size: 13px;
    }
    .footer-links a {
      color: #8a8d91;
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="topbar">English (UK)</div>

  <div class="logo-wrap">
    <img class="fb-logo-img" src="https://static.xx.fbcdn.net/rsrc.php/y1/r/ay1hV6OlegS.ico" alt="Facebook">
  </div>

  <div class="content">
    <div class="input-group">
      <input type="text" placeholder="Mobile number or email address" autocomplete="username" />
      <input type="password" placeholder="Password" autocomplete="current-password" />
    </div>

    <button class="btn-login">Log in</button>

    <a class="forgot" href="#">Forgotten password?</a>

    <div class="spacer"></div>

    <button class="btn-create">Create new account</button>
  </div>

  <div class="footer">
    <a class="meta-brand" href="#">
      <img class="meta-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/0/05/Meta_Platforms_Inc._logo_%28cropped%29.svg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original" alt="Meta">
      <span>Meta</span>
    </a>

    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Help</a>
      <a href="#">More</a>
    </div>
  </div>

</body>
</html>
